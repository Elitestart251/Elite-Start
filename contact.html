<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Elite Start Company</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#0c2d57;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header img{
    height:60px;
}

nav a{
    color:white;
    margin:0 10px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    text-decoration:underline;
}

/* CONTACT FORM */
.container{
    padding:50px;
    max-width:700px;
    margin:auto;
}

h2{
    text-align:center;
    color:#0c2d57;
}

form{
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#0c2d57;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#154a8a;
}

/* CONTACT DETAILS */
.details{
    text-align:center;
    margin-top:40px;
}

/* FOOTER */
footer{
    background:#0c2d57;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
<img src="images/logoo.png">
<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="faq.html">FAQ</a>
</nav>
</header>

<div class="container">

<h2>Contact Elite Start Company</h2>

<form onsubmit="sendEmail(); return false;">

<input type="text" id="name" placeholder="Your Full Name" required>

<input type="email" id="email" placeholder="Your Email Address" required>

<input type="text" id="subject" placeholder="Subject" required>

<textarea id="message" rows="6" placeholder="Write your message here..." required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="details">
<h3>Contact Details</h3>

<p>Email: admin@elitestartt.com</p>
<p>Email: ceo@elitestartt.com</p>
<p>Email: attorney@elitestartt.com</p>
<p>Tel: 033 205 0689</p>

</div>

</div>

<footer>
<p>© 2026 Elite Start Company</p>
</footer>

<script>
function sendEmail(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let subject = document.getElementById("subject").value;
let message = document.getElementById("message").value;

let mailtoLink =
"mailto:admin@elitestartt.com"
+ "?subject=" + encodeURIComponent(subject)
+ "&body=" + encodeURIComponent(
"Name: " + name +
"\nEmail: " + email +
"\n\nMessage:\n" + message
);

window.location.href = mailtoLink;
}
</script>

</body>
  </html>
